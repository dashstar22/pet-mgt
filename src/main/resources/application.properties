spring.datasource.url=jdbc:mysql://localhost:3306/pet_mgt?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# UTF-8 encoding for HTTP requests/responses
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.sql.init.encoding=UTF-8
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
mybatis-plus.configuration.map-underscore-to-camel-case=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads/pets
file.allowed-extensions=jpg,jpeg,png
ai.deepseek.api-key=${123123:}
ai.deepseek.endpoint=https://api.deepseek.com/v1/chat/completions
ai.deepseek.model=deepseek-chat
ai.timeout=10000
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
server.servlet.session.tracking-modes=COOKIE
server.port=8081
