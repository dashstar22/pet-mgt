<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-primary"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container">
        <a class="navbar-brand" href="/">pet-mgt</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/pets"
                       th:classappend="${#httpServletRequest.requestURI == '/pets' || #httpServletRequest.requestURI.startsWith('/pets/') ? 'active' : ''}">宠物列表</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/user/ai-match"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/user/ai-match') ? 'active' : ''}">AI 匹配</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/user/applications"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/user/applications') ? 'active' : ''}">我的申请</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/user/ai-chat"
                       th:classappend="${#httpServletRequest.requestURI == '/user/ai-chat' ? 'active' : ''}">养宠问答</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" href="/admin"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/admin') ? 'active' : ''}">后台管理</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/login"
                       th:classappend="${#httpServletRequest.requestURI == '/login' ? 'active' : ''}">登录</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/register"
                       th:classappend="${#httpServletRequest.requestURI == '/register' ? 'active' : ''}">注册</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false"
                       th:text="${#authentication.name}">用户名</a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="/user/profile">个人中心</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item">退出登录</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
