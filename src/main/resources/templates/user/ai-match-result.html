<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(title=${title})}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<div class="container mt-4">
    <h1 class="mb-3">AI 匹配结果</h1>

    <div th:if="${results == null || #lists.isEmpty(results)}">
        <div class="alert alert-info">暂无匹配结果。请先完成匹配问卷。</div>
        <a href="/user/ai-match" class="btn btn-primary">返回匹配</a>
    </div>

    <div th:if="${results != null && !#lists.isEmpty(results)}">
        <p class="text-muted mb-3">
            <span th:if="${aiUsed}">AI 根据您的偏好推荐以下宠物：</span>
            <span th:unless="${aiUsed}">根据您的偏好为您匹配以下宠物（AI 服务暂时不可用，当前为本地规则匹配）：</span>
        </p>

        <div class="row">
            <div class="col-md-6 col-lg-4 mb-3" th:each="r : ${results}">
                <div class="card h-100">
                    <img th:if="${r.coverImageUrl}"
                         th:src="@{/uploads/pets/{name}(name='thumb_' + ${r.coverImageUrl})}"
                         onerror="this.onerror=null;this.src=this.src.replace('thumb_','');"
                         class="card-img-top" style="height:200px;object-fit:cover;">
                    <div class="card-img-top bg-light d-flex align-items-center justify-content-center"
                         th:if="${r.coverImageUrl == null}"
                         style="height:200px;">
                        <span class="text-muted">暂无图片</span>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0" th:text="${r.petName}">-</h5>
                            <span class="badge bg-primary fs-6"
                                  th:text="${r.matchScore} + '分'">-</span>
                        </div>
                        <p class="card-text text-muted small" th:text="${r.reason}">-</p>
                        <p class="card-text" th:if="${r.notes}">
                            <small class="text-warning" th:text="'注意：' + ${r.notes}"></small>
                        </p>
                    </div>
                    <div class="card-footer d-flex justify-content-between">
                        <a th:href="@{/pets/{id}(id=${r.petId})}" class="btn btn-outline-primary btn-sm">查看详情</a>
                        <a th:if="${r.suggestApply}"
                           th:href="@{/user/apply/{petId}(petId=${r.petId})}"
                           class="btn btn-success btn-sm">申请领养</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/user/ai-match" class="btn btn-primary">重新匹配</a>
            <a href="/user/ai-match/history" class="btn btn-outline-secondary">匹配历史</a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
