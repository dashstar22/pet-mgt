<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${title})}"></head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">我的申请</h2>
            <form th:if="${page.records != null && !page.records.isEmpty()}"
                  method="post" th:action="@{/user/applications/clear}"
                  onsubmit="return confirm('确定要清空所有申请记录吗？此操作不可恢复。')">
                <button type="submit" class="btn btn-danger btn-sm">清空记录</button>
            </form>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Empty state -->
        <div th:if="${page.records == null || page.records.isEmpty()}" class="empty-state">
            <div class="icon">📋</div>
            <p class="text-muted fs-4">暂无申请记录</p>
            <a href="/pets" class="btn btn-outline-primary">去看看待领养宠物</a>
        </div>

        <!-- Application list -->
        <div th:if="${page.records != null && !page.records.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>宠物</th>
                            <th>品种</th>
                            <th>联系电话</th>
                            <th>状态</th>
                            <th>申请时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${page.records}">
                            <td>
                                <a th:href="@{/pets/{id}(id=${app.petId})}" th:text="${app.petName}"></a>
                            </td>
                            <td th:text="${app.breedName}">-</td>
                            <td th:text="${app.phone}"></td>
                            <td>
                                <span th:class="'badge ' + (${app.status} == 'pending' ? 'bg-warning text-dark' : (${app.status} == 'approved' ? 'bg-success' : (${app.status} == 'rejected' ? 'bg-danger' : 'bg-secondary')))"
                                      th:text="${app.status} == 'pending' ? '待审核' : (${app.status} == 'approved' ? '已通过' : (${app.status} == 'rejected' ? '已拒绝' : '已取消'))"></span>
                            </td>
                            <td th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <form th:action="@{/user/applications/{id}/cancel(id=${app.id})}" method="post"
                                      th:if="${app.status == 'pending'}" style="display:inline;">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm me-1"
                                            onclick="return confirm('确定要取消此申请吗？')">取消申请</button>
                                </form>
                                <form th:action="@{/user/applications/{id}/delete(id=${app.id})}" method="post"
                                      th:if="${app.status != 'approved'}" style="display:inline;">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('确定要删除此申请记录吗？此操作不可恢复。')">删除</button>
                                </form>
                                <span th:if="${app.status == 'rejected' and app.reviewComment != null}"
                                      class="text-muted small d-block mt-1"
                                      th:text="${app.reviewComment}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:replace="~{fragments/pagination :: pagination(${page}, '/user/applications')}"></div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
